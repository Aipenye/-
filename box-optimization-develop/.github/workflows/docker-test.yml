name: Docker Deployment Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  detect_doc_change:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.set_result.outputs.docs_only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect docs-only changes
        id: set_result
        run: |
          set -e
          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "push" ]; then
          files=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          else
          git fetch origin ${{ github.base_ref }}
          files=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          fi

          echo "Changed files:"
          echo "$files"

          non_docs=$(echo "$files" | grep -vE '(^docs/|\.md$)' || true)

          if [ -n "$non_docs" ]; then
          echo "docs_only=false" >> $GITHUB_OUTPUT
          else
          echo "docs_only=true" >> $GITHUB_OUTPUT
          fi

  docker_deploy_test:
    runs-on: ubuntu-latest
    needs: detect_doc_change
    if: needs.detect_doc_change.outputs.docs_only == 'false'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose (if needed)
        run: sudo apt-get install docker-compose -y

      - name: Build and start services
        run: |
          docker compose up -d --build

      - name: Wait for services to initialize
        run: |
          echo "Waiting for services to be ready..."
          sleep 15

      - name: Check container status
        run: |
          docker ps
          docker compose ps

      - name: Tear down containers
        if: always()
        run: docker compose down
