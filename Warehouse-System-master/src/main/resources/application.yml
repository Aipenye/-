server:
  port: 8002

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wms?useUnicode=true&characterEncoding=utf-8&serveTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    # password: yourRedisPassword  # 如有密码取消注释
    database: 0

# 阿里云短信配置（需替换为真实值）
aliyun:
  sms:
    access-key-id: YOUR_ACCESS_KEY_ID
    access-key-secret: YOUR_ACCESS_KEY_SECRET
    sign-name: 您的短信签名
    template-code: SMS_XXXXXXXXX

Logging:
  level:
    com.wms: debug